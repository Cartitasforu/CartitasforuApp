name: Deploy Staging

on:
    push:
        branches:
            - main
        paths:
            - 'supabase/**'
            - '.github/workflows/deploy-staging.yml'
    workflow_dispatch:

concurrency:
    group: deploy-staging-${{ github.ref }}
    cancel-in-progress: true

jobs:
    deploy-staging:
        name: Pushing migrations to Supabase Staging
        runs-on: ubuntu-latest
        environment: staging

        env:
            SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
            SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD_STAGING }}
            PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF_STAGING }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Supabase CLI
              uses: supabase/setup@v1
              with:
                  version: 'latest'

            - name: Link to staging project
              run: supabase link --project-ref $PROJECT_REF

            - name: Push migrations
              run: supabase db push